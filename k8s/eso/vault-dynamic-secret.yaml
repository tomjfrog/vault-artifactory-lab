# Applied by scripts/setup-eso.sh (envsubst). Do not apply raw — placeholders ${...}.
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: artifactory-vaultdemo-token
  namespace: ${K8S_NAMESPACE}
spec:
  path: "/${PLUGIN_VAULT_PATH}/token/${DEMO_ROLE}"
  method: GET
  resultType: Data
  provider:
    server: "${VAULT_URL_FOR_CLUSTER}"
    version: v1
    auth:
      kubernetes:
        mountPath: "${VAULT_K8S_AUTH_PATH}"
        role: "${K8S_AUTH_ROLE}"
        serviceAccountRef:
          name: ${K8S_WORKLOAD_SA}
